apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-deployment
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: root
        - name: MONGO_INITDB_ROOT_PASSWORD   # ✅ FIXED
          value: password
        volumeMounts:                        # ✅ ADD THIS
        - name: mongodb-storage
          mountPath: /data/db
      volumes:                               # ✅ ADD THIS
      - name: mongodb-storage
        persistentVolumeClaim:
          claimName: mongodb-pvc

